<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oba-</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Baloo+2:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="oba-page">
  <header class="oba-header">
    <a href="#" class="oba-logo" aria-label="oba-">
      <img src="imagenes/oba-logo.png" alt="oba-">
    </a>

    <div class="oba-logo-awards" aria-hidden="true">
      <img src="imagenes/oba-premios.png" alt="Premios">
    </div>

    <div class="oba-lang-switch" role="group" aria-label="Seleccionar idioma" data-i18n-attr="aria-label:aria_lang">
      <button type="button" class="oba-lang-btn active" data-lang="es">ES</button>
      <span class="oba-lang-sep">/</span>
      <button type="button" class="oba-lang-btn" data-lang="en">EN</button>
    </div>

    <div class="oba-header-right">
      <nav class="oba-inline-menu" id="oba-inline-menu">
        <a href="#" data-i18n="menu_reserva">RESERVA</a>
        <a href="#" data-i18n="menu_contacto">CONTACTO</a>
        <a href="#" data-i18n="menu_tienda">TIENDA</a>
      </nav>

      <button class="oba-menu-btn" aria-label="Abrir menú" data-i18n-attr="aria-label:aria_menu" aria-expanded="false" aria-controls="oba-inline-menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="oba-bg-layer active" id="bg-chef" style="background-image:url('imagenes/oba-restaurante.jpg');"></div>
  <div class="oba-bg-layer" id="bg-bar" style="background-image:url('imagenes/oba-entorno.jpg');"></div>
  <div class="oba-bg-layer" id="bg-about" style="background-image:url('imagenes/oba-nosotros.jpg');"></div>
  <div class="oba-overlay"></div>

  <main class="oba-hero">
    <nav class="oba-hero-nav">
      <a href="restaurante.html" class="oba-hero-link" data-bg="bg-chef" data-i18n="nav_restaurante">RESTAURANTE</a>
      <a href="#" class="oba-hero-link" data-bg="bg-bar" data-i18n="nav_entorno">ENTORNO</a>
      <a href="#" class="oba-hero-link" data-bg="bg-about" data-i18n="nav_nosotros">NOSOTROS</a>
    </nav>
  </main>

  <a href="#" class="oba-reserve-btn" data-i18n="btn_reservar">RESERVAR</a>

</div>
<script src="script.js"></script>
</body>
</html>
