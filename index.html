<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oba-</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Baloo+2:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="bg-layer active" id="bg-chef" style="background-image:url('restaurante.jpg');"></div>
  <div class="bg-layer" id="bg-bar" style="background-image:url('entorno.jpg');"></div>
  <div class="bg-layer" id="bg-about" style="background-image:url('nosotros.jpg');"></div>
  <div class="overlay"></div>

  <header class="site-header">
    <a href="#" class="logo" aria-label="oba-">
      <img src="logo.png" alt="oba-">
    </a>

    <div class="lang-switch" role="group" aria-label="Seleccionar idioma">
      <button type="button" class="lang-btn active" data-lang="es">ES</button>
      <span class="lang-sep">/</span>
      <button type="button" class="lang-btn" data-lang="en">EN</button>
    </div>

    <div class="header-right">
      <nav class="inline-menu" id="inline-menu">
        <a href="#">RESERVA</a>
        <a href="#">CONTACTO</a>
        <a href="#">TIENDA</a>
      </nav>

      <button class="menu-btn" aria-label="Abrir menú" aria-expanded="false" aria-controls="inline-menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="hero">
    <nav class="hero-nav">
      <a href="restaurante.html" class="hero-link" data-bg="bg-chef">RESTAURANTE</a>
      <a href="#" class="hero-link" data-bg="bg-bar">ENTORNO</a>
      <a href="#" class="hero-link" data-bg="bg-about">NOSOTROS</a>
    </nav>
  </main>

  <a href="#" class="reserve-btn">RESERVAR</a>

  <button class="a11y-btn" aria-label="Opciones de accesibilidad">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
      <circle cx="12" cy="4" r="2"/>
      <path d="M12 7c-3 0-8 1-8 3 0 1 1 1.5 2 1.5 1.5 0 3-1 6-1s4.5 1 6 1c1 0 2-.5 2-1.5 0-2-5-3-8-3z"/>
      <path d="M12 12.5c-1.6 0-3-.3-4-.6l-2 8.6 2 .5 1.6-6.8c.6.1 1.4.2 2.4.2s1.8-.1 2.4-.2l1.6 6.8 2-.5-2-8.6c-1 .3-2.4.6-4 .6z"/>
    </svg>
  </button>

  <script src="script.js"></script>
</body>
</html>
